apiVersion: apps/v1
kind: Deployment
metadata:
  name: pixelwar-frontend
  namespace: pixelwar
  labels:
    app: pixelwar-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pixelwar-frontend
  template:
    metadata:
      labels:
        app: pixelwar-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: pixelwar-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
      volumes:
        - name: nginx-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: pixelwar-frontend
  namespace: pixelwar
  labels:
    app: pixelwar-frontend
spec:
  selector:
    app: pixelwar-frontend
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
