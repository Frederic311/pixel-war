apiVersion: apps/v1
kind: Deployment
metadata:
  name: pixelwar-backend
  namespace: pixelwar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pixelwar-backend
  template:
    metadata:
      labels:
        app: pixelwar-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: backend
        image: pixelwar-backend:local
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_HOST
          value: redis-headless
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pixelwar-secrets
              key: redis_password
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
        livenessProbe:
          httpGet:
            path: /livez
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 20
          timeoutSeconds: 2
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: pixelwar-backend
  namespace: pixelwar
spec:
  selector:
    app: pixelwar-backend
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
  type: ClusterIP